version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticketrush-backend
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${SUPABASE_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${SUPABASE_DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SUPABASE_DB_PASSWORD}
      - SPRING_DATA_REDIS_URL=${REDIS_URL}
      - JWT_SET_URI=${JWT_SET_URI}
      - SUPABASE_API_URL=${SUPABASE_API_URL}
      - SUPABASE_API_KEY=${SUPABASE_API_KEY}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: ticketrush-frontend
    ports:
      - "80:80" 
    restart: always
    depends_on:
      - backend